# Starship Configuration (Refined for Go, Node, Kube, Docker, and Python)
# Theme: Catppuccin Mocha

palette = "catppuccin_mocha"
add_newline = true

[palettes.catppuccin_mocha]
rosewater = "#F5E0DC"
flamingo = "#F2CDCD"
pink = "#F5C2E7"
mauve = "#CBA6F7"
red = "#F38BA8"
maroon = "#EBA0AC"
peach = "#FAB387"
yellow = "#F9E2AF"
green = "#A6E3A1"
teal = "#94E2D5"
sky = "#89DCEB"
sapphire = "#74C7EC"
blue = "#89B4FA"
lavender = "#B4BEFE"
text = "#CDD6F4"
subtext1 = "#BAC2DE"
surface0 = "#313244"
base = "#1E1E2E"

# Line 1: Context (Dir, Git, Languages, Infra)
# Line 2: Action (Character)
format = """
$directory$git_branch$git_status$c$golang$nodejs$python$rust$lua$docker_context$kubernetes$cmd_duration
$character"""

command_timeout = "500"

[directory]
style = "bold fg:blue"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "ÔÇª/"
read_only = " ¾░î¥"


[git_branch]
symbol = "¯éá "
style = "fg:mauve"
format = "[$symbol$branch]($style) "
truncation_length = 24

[git_status]
style = "fg:subtext1"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "="
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "Ôçò${ahead_count}/${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "Ô£ò${count}"
renamed = "┬╗${count}"

[character]
success_symbol = "[ÔØ»](fg:green)"
error_symbol = "[ÔØ»](fg:red)"
vimcmd_symbol = "[ÔØ«](fg:blue)"

[golang]
symbol = "¯ÿº "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[nodejs]
symbol = "¯£ÿ "
style = "bold green"
format = "[$symbol($version )]($style)"

[python]
symbol = "¯êÁ "
style = "bold yellow"
format = "[$symbol($version )(\\($virtualenv\\) )]($style)"
pyenv_prefix = "pyenv "

[rust]
symbol = "¯×¿ "
style = "bold maroon"
format = "[$symbol($version )]($style)"

[lua]
symbol = "¯ÿá "
style = "bold blue"
format = "[$symbol($version )]($style)"

[docker_context]
symbol = "´îê "
style = "bold sky"
format = "[$symbol$context]($style) "

[kubernetes]
symbol = "¾▒â¥ "
style = "bold blue"
disabled = false
format = "[$symbol$context( \\($namespace\\))]($style) "

[cmd_duration]
min_time = 2_000
style = "fg:yellow"
format = "took [$duration]($style) "

[aws]
disabled = true

[gcloud]
disabled = true

[terraform]
disabled = true

[ruby]
disabled = true
