set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

%if "#{==:#{E:XDG_CONFIG_HOME},}"
set-environment -g XDG_CONFIG_HOME "$HOME/.config"
%endif
%if "#{==:#{E:XDG_DATA_HOME},}"
set-environment -g XDG_DATA_HOME "$HOME/.local/share"
%endif

set -g mouse on
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
setw -g mode-keys vi
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g focus-events on
setw -g aggressive-resize on
set -g allow-passthrough on
set -g visual-activity off
set -g @continuum-restore 'on'

# Keep splits rooted in the current project instead of $HOME.
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind x kill-pane
bind & kill-window
bind s choose-tree -Zw
bind z resize-pane -Z
bind R source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

run "$XDG_DATA_HOME/tmux/plugins/tpm/tpm"

# Catppuccin bottom bar with live tmux mode and key hints.
set -g status on
set -g status-interval 2
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 100
set -g status-right-length 160
set -g status-justify left

set -g status-left "#[fg=#a6e3a1,bg=#1e1e2e]#[fg=#11111b,bg=#a6e3a1,bold]󰆍 #[fg=#cdd6f4,bg=#313244] #S #[fg=#313244,bg=#1e1e2e]#[fg=#f5c2e7,bg=#1e1e2e]#[fg=#11111b,bg=#f5c2e7,bold] #[fg=#cdd6f4,bg=#313244] #{b:pane_current_path} #[fg=#313244,bg=#1e1e2e]"

set -g status-right "#[fg=#{?client_prefix,#f38ba8,#{?pane_in_mode,#f9e2af,#{?pane_synchronized,#fab387,#89b4fa}}},bg=#1e1e2e]#[fg=#11111b,bg=#{?client_prefix,#f38ba8,#{?pane_in_mode,#f9e2af,#{?pane_synchronized,#fab387,#89b4fa}}},bold]#{?client_prefix,󰘳 ,#{?pane_in_mode,󰆏 ,#{?pane_synchronized,󰓦 ,󰨊 }}}#[fg=#cdd6f4,bg=#313244,bold] #{?client_prefix,PREFIX,#{?pane_in_mode,COPY,#{?pane_synchronized,SYNC,INSERT}}} #[fg=#313244,bg=#1e1e2e]#[fg=#94e2d5,bg=#1e1e2e]#[fg=#11111b,bg=#94e2d5,bold]󱕴 #[fg=#cdd6f4,bg=#313244] #{?client_prefix,h/j/k/l move  H/J/K/L resize  | split  - split  c new,#{?pane_in_mode,Space select  y yank  / search  n next,#{?pane_synchronized,broadcast input to all panes,C-Space leader  h/j/k/l panes  prefix+[ copy}}} #[fg=#313244,bg=#1e1e2e]#{E:@catppuccin_status_date_time}"

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#89b4fa"
